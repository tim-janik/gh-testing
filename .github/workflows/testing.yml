# Linting: xclip -sel c <.github/workflows/testing.yml # https://rhysd.github.io/actionlint/

on:
  push:
    branches: ['master', 'trunk', 'wip/**']
    # tags: [ 'v[0-9]+.[0-9]+.[0-9]+*' ]

jobs:

  Focal-CI:
    runs-on: ubuntu-latest
    container: { image: 'ghcr.io/tim-janik/anklang-ci:noble-latest', options: --user runner }
    steps:
    - run: id
    - run: pwd
    - run: ls -al
    - { uses: actions/checkout@v4.1.1, with: { fetch-depth: 0, submodules: recursive, github-server-url: 'https://github.com' } }
    - run: git fetch -f --tags		# Fix actions/checkout#290
    - run: git describe --always --long
    - run: pwd
    - run: ls -al
    - run: df -h
    - run: cat /proc/mounts
    - run: cat /proc/cpuinfo
    - name: CI Tests
      run: |
        git describe
        docker images
        du -hsc ~
    - run: |
        git describe | tee git-describe && ls -al
        git -P log -1 --oneline
    - name: Ping IRC
      if: ${{ always() && !env.ACT }}
      run: |
        env
        echo 'GITHUB_EVENT_PATH: '"$GITHUB_EVENT_PATH"
        ls -lR /github/
        echo '[${{ toJson(github) }},${{ toJson(job) }}]'
        echo 'github.repository: ${{ github.repository }}'
        echo 'github.ref: ${{ github.ref }}'
        echo 'job.status: ${{ job.status }}'
        echo 'github.event.head_commit ${{ github.event.head_commit }}'
        echo 'github.event.head_commit.url ${{ github.event.head_commit.url }}'
        echo 'github.actor: ${{ github.actor }}'
        echo 'git branch --show-current: '"$(git branch --show-current)"
        echo 'git log -1: '"$(git log -1 --format='%s')"
    - uses: actions/upload-artifact@v4
      with: { name: assets, path: git-describe }
